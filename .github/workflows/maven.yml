# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Build and run tests with code coverage
    - name: Build with Maven (verify phase includes tests)
      run: mvn -B verify -Pcoverage --file pom.xml

    # Upload test reports
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: '**/target/surefire-reports/*.xml'

    # Upload JaCoCo coverage report
    - name: Upload JaCoCo coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: jacoco-report
        path: '**/target/site/jacoco/*.xml'

    # Upload SpotBugs results
    - name: Upload SpotBugs results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: spotbugs-report
        path: '**/target/spotbugsXml.xml'

  sonarcloud:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Analyze with SonarCloud
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: mvn -B sonar -Dsonar.organization=jnie -Dsonar.projectKey=jnie_multi-module-architecture -Pcoverage --file pom.xml
